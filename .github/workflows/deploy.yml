name: Deploy

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: Print variable
        run: echo "El valor de mi variable es:${{ vars.MI_VARIABLE_PRUEBAS }}"
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

